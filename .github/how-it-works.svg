<svg viewBox="0 0 1280 520" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0f172a"/>
<stop offset="100%" stop-color="#1e293b"/>
</linearGradient>
</defs>
<rect width="1280" height="520" fill="url(#bg2)" rx="12"/>

<!-- Grid background -->
<g opacity="0.04">
<line x1="0" y1="80" x2="1280" y2="80" stroke="#fff" stroke-width="0.5"/>
<line x1="0" y1="160" x2="1280" y2="160" stroke="#fff" stroke-width="0.5"/>
<line x1="0" y1="240" x2="1280" y2="240" stroke="#fff" stroke-width="0.5"/>
<line x1="0" y1="320" x2="1280" y2="320" stroke="#fff" stroke-width="0.5"/>
<line x1="0" y1="400" x2="1280" y2="400" stroke="#fff" stroke-width="0.5"/>
</g>

<!-- Title -->
<text x="640" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="600" fill="#e2e8f0" letter-spacing="-0.5">How it works</text>

<!-- Step 1: Your Site -->
<rect x="60" y="90" width="260" height="340" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
<rect x="60" y="90" width="260" height="44" rx="12" fill="#334155"/>
<rect x="240" y="90" width="80" height="44" fill="#334155"/>
<text x="190" y="117" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">Your WordPress site</text>

<!-- Site items -->
<g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="12" fill="#94a3b8">
<circle cx="88" cy="158" r="4" fill="#3b82f6" opacity="0.7"/><text x="100" y="162">Theme + customizer settings</text>
<circle cx="88" cy="186" r="4" fill="#3b82f6" opacity="0.7"/><text x="100" y="190">Active plugins + versions</text>
<circle cx="88" cy="214" r="4" fill="#3b82f6" opacity="0.7"/><text x="100" y="218">Server environment</text>
<circle cx="88" cy="242" r="4" fill="#3b82f6" opacity="0.7"/><text x="100" y="246">wp-config constants</text>
<circle cx="88" cy="270" r="4" fill="#3b82f6" opacity="0.7"/><text x="100" y="274">.htaccess</text>
<circle cx="88" cy="298" r="4" fill="#3b82f6" opacity="0.7"/><text x="100" y="302">Menu structure + widgets</text>
<circle cx="88" cy="326" r="4" fill="#3b82f6" opacity="0.7"/><text x="100" y="330">Cron jobs + debug log</text>
<circle cx="88" cy="354" r="4" fill="#3b82f6" opacity="0.7"/><text x="100" y="358">Page content + blocks</text>
<circle cx="88" cy="382" r="4" fill="#3b82f6" opacity="0.7"/><text x="100" y="386">Shortcodes, hooks, images</text>
<circle cx="88" cy="410" r="4" fill="#22c55e" opacity="0.7"/><text x="100" y="414">15+ data points total</text>
</g>

<!-- Arrow 1 -->
<line x1="340" y1="260" x2="420" y2="260" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
<polygon points="420,254 434,260 420,266" fill="#3b82f6" opacity="0.5"/>
<text x="387" y="248" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="11" fill="#64748b">one click</text>

<!-- Step 2: TraceWP -->
<rect x="440" y="90" width="300" height="340" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
<rect x="440" y="90" width="300" height="44" rx="12" fill="#1d4ed8" opacity="0.2"/>
<rect x="600" y="90" width="140" height="44" fill="#1d4ed8" opacity="0.2"/>
<rect x="600" y="118" width="140" height="16" rx="0" fill="#1e293b"/>
<text x="590" y="117" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600" fill="#60a5fa">TraceWP</text>

<!-- TraceWP features -->
<g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif">
<!-- Export -->
<rect x="460" y="150" width="260" height="70" rx="8" fill="#334155" opacity="0.5"/>
<text x="476" y="172" font-size="13" font-weight="600" fill="#e2e8f0">Context Export</text>
<text x="476" y="192" font-size="11" fill="#94a3b8">Structured markdown with role</text>
<text x="476" y="206" font-size="11" fill="#94a3b8">instructions + table of contents</text>

<!-- Inspector -->
<rect x="460" y="232" width="260" height="70" rx="8" fill="#334155" opacity="0.5"/>
<text x="476" y="254" font-size="13" font-weight="600" fill="#e2e8f0">Front-end Inspector</text>
<text x="476" y="274" font-size="11" fill="#94a3b8">Click any element to capture</text>
<text x="476" y="288" font-size="11" fill="#94a3b8">selector, classes, and context</text>

<!-- AI -->
<rect x="460" y="314" width="260" height="70" rx="8" fill="#334155" opacity="0.5"/>
<text x="476" y="336" font-size="13" font-weight="600" fill="#e2e8f0">AI Investigator</text>
<text x="476" y="356" font-size="11" fill="#94a3b8">Built-in chat reads your files</text>
<text x="476" y="370" font-size="11" fill="#94a3b8">and traces issues (read-only)</text>

<!-- Optional badge -->
<rect x="636" y="324" width="72" height="18" rx="9" fill="none" stroke="#64748b" stroke-width="0.8"/>
<text x="672" y="337" text-anchor="middle" font-size="10" fill="#64748b">optional</text>
</g>

<!-- Arrow 2 (top - paste) -->
<line x1="760" y1="185" x2="840" y2="185" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
<polygon points="840,179 854,185 840,191" fill="#3b82f6" opacity="0.5"/>
<text x="807" y="173" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="11" fill="#64748b">copy + paste</text>

<!-- Arrow 2 (bottom - direct) -->
<line x1="760" y1="349" x2="840" y2="349" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
<polygon points="840,343 854,349 840,355" fill="#22c55e" opacity="0.5"/>
<text x="807" y="337" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="11" fill="#64748b">or built-in</text>

<!-- Step 3: AI -->
<rect x="860" y="90" width="340" height="340" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
<rect x="860" y="90" width="340" height="44" rx="12" fill="#334155"/>
<rect x="1060" y="90" width="140" height="44" fill="#334155"/>
<text x="1030" y="117" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">AI gets useful answers</text>

<!-- AI conversation -->
<g font-family="'SF Mono',Consolas,'Liberation Mono',monospace" font-size="11">
<!-- User message -->
<rect x="880" y="150" width="300" height="36" rx="6" fill="#1d4ed8" opacity="0.15"/>
<text x="892" y="172" fill="#60a5fa">My hero section font looks wrong</text>

<!-- AI response -->
<rect x="880" y="198" width="300" height="100" rx="6" fill="#334155" opacity="0.4"/>
<text x="892" y="218" fill="#94a3b8">Your theme BlogHash 1.0.21 uses</text>
<text x="892" y="234" fill="#94a3b8">the customizer setting</text>
<text x="892" y="250" fill="#60a5fa">headings_font_family: Playfair</text>
<text x="892" y="268" fill="#94a3b8">Go to Customize > Typography ></text>
<text x="892" y="284" fill="#94a3b8">Headings to change it.</text>

<!-- AI knows -->
<rect x="880" y="316" width="300" height="96" rx="6" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="0.5" opacity="0.2"/>
<text x="892" y="338" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="500" fill="#4ade80">The AI already knows:</text>
<text x="892" y="358" fill="#94a3b8" font-size="11">Your exact theme + version</text>
<text x="892" y="374" fill="#94a3b8" font-size="11">Your customizer settings</text>
<text x="892" y="390" fill="#94a3b8" font-size="11">Your plugins, server, config...</text>
<text x="892" y="406" fill="#4ade80" font-size="11">No back-and-forth needed</text>
</g>

<!-- Bottom tagline -->
<text x="640" y="478" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="14" fill="#475569">Skip the "what theme are you using?" — TraceWP gives AI your full site context in one click</text>
</svg>
